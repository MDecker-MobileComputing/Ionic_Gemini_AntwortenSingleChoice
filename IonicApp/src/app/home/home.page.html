<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Antworten für Single-Choice-Fragen erzeugen</ion-title>    
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-grid>
    <ion-row>
      <ion-col size="12">
        <ion-item>
          <ion-label position="stacked">Frage</ion-label>
          <ion-textarea 
                placeholder="Single-Choice-Frage eingeben, z.B. welcher der folgenden Städte ist keine europäische Hauptstadt?" 
                [(ngModel)]="frage"></ion-textarea>
        </ion-item>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="12" size-md="6">
        <ion-button expand="block" (click)="onErzeugenButton()">Erzeugen</ion-button>
      </ion-col>
      <ion-col size="12" size-md="6">
        <ion-button expand="block" color="medium" (click)="onLoeschenButton()">Löschen</ion-button>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="12">
        <ion-item>
          <ion-label position="stacked">Antwortoption 1 (richtige Antwort)</ion-label>
          <ion-input readonly [(ngModel)]="antwortoption1"></ion-input>
        </ion-item>
      </ion-col>

      <ion-col size="12">
        <ion-item>
          <ion-label position="stacked">Antwortoption 2</ion-label>
          <ion-input readonly [(ngModel)]="antwortoption2"></ion-input>
        </ion-item>
      </ion-col>

      <ion-col size="12">
        <ion-item>
          <ion-label position="stacked">Antwortoption 3</ion-label>
          <ion-input readonly [(ngModel)]="antwortoption3"></ion-input>
        </ion-item>
      </ion-col>

      <ion-col size="12">
        <ion-item>
          <ion-label position="stacked">Antwortoption 4</ion-label>
          <ion-input readonly [(ngModel)]="antwortoption4"></ion-input>
        </ion-item>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
